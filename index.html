<html>
    <head>
        <title>BitMarket</title>
        <link rel="stylesheet" href="style.css">
    </head>
    
<body>
    <!-- Верхний блок с меню -->
    <div class="header">
        <div class="menu">
            <a href="#" class="menu-item">Главная</a>
            <a href="#" class="menu-item">Микрозелень</a>
        </div>
<div class="logo">
            <img src="https://github.com/ivanteevaao-droid/green/blob/main/logo.jpg?raw=true" alt="Травы Сатка">
        </div>
            <div class="menu">
            <a href="#" class="menu-item">Проростки</a>
            <a href="#" class="menu-item">Грибы</a>
        </div>
        
    </div>

    <!-- Основной контент (три ряда с товарами) -->
    <div class="content">
        <!-- Первый ряд (грибы) -->
        <div class="row" id="row-1">
            <div class="item">
                <img src="https://github.com/ivanteevaao-droid/green/blob/main/1%201.jpg?raw=true" alt="Грибы 1">
                <a href="#" class="btn">подробнее</a>
            </div>
            <div class="item">
                <img src="https://github.com/ivanteevaao-droid/green/blob/main/1%20(5).jpg?raw=true" alt="Грибы 2">
                <a href="#" class="btn">подробнее</a>
            </div>
            <div class="item">
                <img src="https://github.com/ivanteevaao-droid/green/blob/main/1%20(3).jpg?raw=true" alt="Грибы 3">
                <a href="#" class="btn">подробнее</a>
            </div>
        </div>

        <!-- Второй ряд (микрозелень) -->
        <div class="row" id="row-2">
            <div class="item">
                <img src="https://github.com/ivanteevaao-droid/green/blob/main/1%20(1).jpg?raw=true" alt="Микрозелень 1">
                <a href="#" class="btn">подробнее</a>
            </div>
            <div class="item">
                <img src="https://github.com/ivanteevaao-droid/green/blob/main/1%20(4).jpg?raw=true" alt="Микрозелень 2">
                <a href="#" class="btn">подробнее</a>
            </div>
            <div class="item">
                <img src="https://github.com/ivanteevaao-droid/green/blob/main/1%20(6).jpg?raw=true" alt="Микрозелень 3">
                <a href="#" class="btn">подробнее</a>
            </div>
        </div>

        <!-- Третий ряд (проростки) -->
        <div class="row" id="row-3">
            <div class="item">
                <img src="https://github.com/ivanteevaao-droid/green/blob/main/1%20(2).jpg?raw=true" alt="Проростки 1">
                <a href="#" class="btn">подробнее</a>
            </div>
            <div class="item">
                <img src="https://github.com/ivanteevaao-droid/green/blob/main/1%20(7).jpg?raw=true" alt="Проростки 2">
                <a href="#" class="btn">подробнее</a>
            </div>
            <div class="item">
                <img src="https://github.com/ivanteevaao-droid/green/blob/main/1%20(8).jpg?raw=true" alt="Проростки 3">
                <a href="#" class="btn">подробнее</a>
            </div>
        </div>
    </div>

    <!-- Нижний блок (футер) -->
    <div class="footer">
        <!-- Здесь можно добавить контактную информацию или логотип -->
    </div>
</body>
</html>
